name: Aethelguard
version: '${version}'
main: me.aethelster.aethelguard.Aethelguard
api-version: '1.21'
author: Aethelster
description: Aethelguard auth system with clean logs and configurable security.
commands:
  aethelguard:
    description: Aethelguard admin commands.
    aliases: [ag, aeg, ayarlar]
    permission: aethelguard.admin
  register:
    description: Register your account.
    aliases: [kayitol, kayıtol, kayit]
  login:
    description: Log in to your account.
    aliases: [giris, giriş]
  changepassword:
    description: Change your own account password.
    aliases: [sifredegistir, şifredeğiştir, password]
  captcha:
    description: Solve your Aethelguard captcha challenge.
    aliases: [dogrula, doğrula]
  twofactor:
    description: Manage or verify two-factor authentication.
    aliases: [2fa, authenticator, authy]
permissions:
  aethelguard.admin:
    description: Allows access to Aethelguard admin commands.
    default: op
  aethelguard.bypass.iplimit:
    description: Bypasses the per-IP registration limit.
    default: op
